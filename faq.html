            <p data-en="Answers for distributors and trade partners on distribution, products, supply, and business support across North America." data-es="Respuestas para distribuidores y socios comerciales sobre distribución, productos, suministro y soporte empresarial en América del Norte." data-fr="Des réponses pour les distributeurs et partenaires professionnels sur la distribution, les produits, l'approvisionnement et le support commercial en Amérique du Nord."></p>

    <section>
        <div class="section-container">
            <div class="faq-group">
                <div class="faq-cat">
                    <h2 class="faq-cat-title" data-en="Distribution Partnership" data-es="Asociación de Distribución" data-fr="Partenariat de Distribution"></h2>
                    <details class="faq-item">
                        <summary data-en="Who can become a FIXORA distribution partner?" data-es="¿Quién puede convertirse en socio de distribución de FIXORA?" data-fr="Qui peut devenir partenaire de distribution FIXORA ?"></summary>
                        <div class="faq-answer" data-en="We partner with established distributors, wholesalers, and trade suppliers serving the North American market who are looking for a dependable, long-term supply relationship." data-es="Nos asociamos con distribuidores, mayoristas y proveedores del sector establecidos que atienden el mercado de América del Norte y buscan una relación de suministro confiable y a largo plazo." data-fr="Nous nous associons à des distributeurs, grossistes et fournisseurs professionnels établis desservant le marché nord-américain et recherchant une relation d'approvisionnement fiable et à long terme."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="Do you have minimum order quantities (MOQ)?" data-es="¿Tienen cantidades mínimas de pedido (MOQ)?" data-fr="Avez-vous des quantités minimales de commande (MOQ) ?"></summary>
                        <div class="faq-answer" data-en="Yes. MOQs vary by product line and are kept reasonable for distributors. Our sales team will share the specifics for the categories you plan to carry." data-es="Sí. Los MOQ varían según la línea de productos y se mantienen razonables para los distribuidores. Nuestro equipo de ventas le compartirá los detalles según las categorías que planee manejar." data-fr="Oui. Les MOQ varient selon la gamme de produits et restent raisonnables pour les distributeurs. Notre équipe commerciale vous communiquera les détails selon les catégories que vous prévoyez de proposer."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="Do you offer exclusive distribution opportunities?" data-es="¿Ofrecen oportunidades de distribución exclusiva?" data-fr="Proposez-vous des opportunités de distribution exclusive ?"></summary>
                        <div class="faq-answer" data-en="Exclusive and territory-based arrangements are available for qualified partners on a case-by-case basis. Contact our sales team to discuss your market." data-es="Los acuerdos exclusivos y por territorio están disponibles para socios calificados, evaluados caso por caso. Contacte a nuestro equipo de ventas para hablar sobre su mercado." data-fr="Des accords exclusifs et par territoire sont disponibles pour les partenaires qualifiés, au cas par cas. Contactez notre équipe commerciale pour discuter de votre marché."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="How do I become a distributor?" data-es="¿Cómo me convierto en distribuidor?" data-fr="Comment devenir distributeur ?"></summary>
                        <div class="faq-answer" data-en="Reach out through our Partner or Contact page. After a short review of your business and market, we'll follow up with pricing, terms, and next steps." data-es="Comuníquese a través de nuestra página de Asociación o Contacto. Tras una breve revisión de su negocio y mercado, le responderemos con precios, condiciones y próximos pasos." data-fr="Contactez-nous via notre page Partenariat ou Contact. Après un bref examen de votre entreprise et de votre marché, nous reviendrons vers vous avec les prix, les conditions et les prochaines étapes."></div>
                    </details>
                </div>
                <div class="faq-cat">
                    <h2 class="faq-cat-title" data-en="Products" data-es="Productos" data-fr="Produits"></h2>
                    <details class="faq-item">
                        <summary data-en="What product categories does FIXORA offer?" data-es="¿Qué categorías de productos ofrece FIXORA?" data-fr="Quelles catégories de produits FIXORA propose-t-elle ?"></summary>
                        <div class="faq-answer" data-en="We focus on door hardware — smart locks, mechanical locks, and sliding door hardware — with more categories planned. The lineup is intentionally focused to be easy to stock and sell." data-es="Nos enfocamos en herrajes para puertas — cerraduras inteligentes, cerraduras mecánicas y herrajes para puertas correderas — con más categorías en camino. La gama es intencionalmente enfocada para ser fácil de almacenar y vender." data-fr="Nous nous concentrons sur la quincaillerie de porte — serrures connectées, serrures mécaniques et quincaillerie de porte coulissante — avec d'autres catégories prévues. La gamme est volontairement ciblée pour être facile à stocker et à vendre."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="Can I request product catalogs or technical specifications?" data-es="¿Puedo solicitar catálogos de productos o especificaciones técnicas?" data-fr="Puis-je demander des catalogues produits ou des spécifications techniques ?"></summary>
                        <div class="faq-answer" data-en="Yes. Catalogs and technical specs are available on request, and downloadable catalogs are provided in the Resources section. Contact us for detailed documentation." data-es="Sí. Los catálogos y las especificaciones técnicas están disponibles a solicitud, y se ofrecen catálogos descargables en la sección de Recursos. Contáctenos para obtener documentación detallada." data-fr="Oui. Les catalogues et spécifications techniques sont disponibles sur demande, et des catalogues téléchargeables sont proposés dans la section Ressources. Contactez-nous pour une documentation détaillée."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="Do you support private label or OEM projects?" data-es="¿Admiten proyectos de marca privada u OEM?" data-fr="Prenez-vous en charge les projets de marque privée ou OEM ?"></summary>
                        <div class="faq-answer" data-en="Yes. We support private label and OEM programs for qualified partners, backed by our manufacturing partners. Share your requirements and we'll advise on feasibility." data-es="Sí. Admitimos programas de marca privada y OEM para socios calificados, respaldados por nuestros socios de fabricación. Comparta sus requisitos y le asesoraremos sobre la viabilidad." data-fr="Oui. Nous prenons en charge les programmes de marque privée et OEM pour les partenaires qualifiés, soutenus par nos partenaires de fabrication. Communiquez-nous vos besoins et nous vous conseillerons sur la faisabilité."></div>
                    </details>
                </div>
                <div class="faq-cat">
                    <h2 class="faq-cat-title" data-en="Supply &amp; Logistics" data-es="Suministro y Logística" data-fr="Approvisionnement et Logistique"></h2>
                    <details class="faq-item">
                        <summary data-en="Do you maintain inventory in North America?" data-es="¿Mantienen inventario en América del Norte?" data-fr="Maintenez-vous des stocks en Amérique du Nord ?"></summary>
                        <div class="faq-answer" data-en="Yes. We hold stock in North America to support faster fulfillment and more reliable supply for our distribution partners." data-es="Sí. Mantenemos existencias en América del Norte para respaldar una entrega más rápida y un suministro más confiable para nuestros socios de distribución." data-fr="Oui. Nous détenons des stocks en Amérique du Nord pour assurer une exécution plus rapide et un approvisionnement plus fiable à nos partenaires de distribution."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="What are your typical lead times?" data-es="¿Cuáles son sus plazos de entrega típicos?" data-fr="Quels sont vos délais de livraison habituels ?"></summary>
                        <div class="faq-answer" data-en="In-stock items ship promptly from North American inventory. For replenishment or larger programs, lead times are confirmed at the time of order." data-es="Los artículos en stock se envían con prontitud desde el inventario en América del Norte. Para reposición o programas más grandes, los plazos se confirman al momento del pedido." data-fr="Les articles en stock sont expédiés rapidement depuis l'inventaire nord-américain. Pour le réapprovisionnement ou les programmes plus importants, les délais sont confirmés au moment de la commande."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="Can you support large-volume orders?" data-es="¿Pueden atender pedidos de gran volumen?" data-fr="Pouvez-vous gérer des commandes de grand volume ?"></summary>
                        <div class="faq-answer" data-en="Yes. Our supply capability, backed by ProBuilder US, is built to support large-volume and recurring orders. Talk to sales for volume planning." data-es="Sí. Nuestra capacidad de suministro, respaldada por ProBuilder US, está diseñada para atender pedidos de gran volumen y recurrentes. Hable con ventas para planificar volúmenes." data-fr="Oui. Notre capacité d'approvisionnement, soutenue par ProBuilder US, est conçue pour gérer les commandes de grand volume et récurrentes. Contactez le service commercial pour planifier les volumes."></div>
                    </details>
                </div>
                <div class="faq-cat">
                    <h2 class="faq-cat-title" data-en="Support &amp; Warranty" data-es="Soporte y Garantía" data-fr="Support et Garantie"></h2>
                    <details class="faq-item">
                        <summary data-en="Do you provide technical support?" data-es="¿Ofrecen soporte técnico?" data-fr="Fournissez-vous un support technique ?"></summary>
                        <div class="faq-answer" data-en="Yes. Our US-based team provides product, technical, and after-sales support to help you and your customers." data-es="Sí. Nuestro equipo con base en EE. UU. brinda soporte de producto, técnico y posventa para ayudarle a usted y a sus clientes." data-fr="Oui. Notre équipe basée aux États-Unis fournit un support produit, technique et après-vente pour vous aider, vous et vos clients."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="What warranty do your products include?" data-es="¿Qué garantía incluyen sus productos?" data-fr="Quelle garantie vos produits incluent-ils ?"></summary>
                        <div class="faq-answer" data-en="FIXORA products carry a manufacturer's warranty against defects in materials and workmanship. Specific terms vary by product line — contact us for details." data-es="Los productos FIXORA cuentan con una garantía del fabricante contra defectos de materiales y mano de obra. Las condiciones específicas varían según la línea de productos — contáctenos para más detalles." data-fr="Les produits FIXORA bénéficient d'une garantie fabricant contre les défauts de matériaux et de fabrication. Les conditions précises varient selon la gamme — contactez-nous pour plus de détails."></div>
                    </details>
                </div>
                <div class="faq-cat">
                    <h2 class="faq-cat-title" data-en="Business &amp; Service" data-es="Negocio y Servicio" data-fr="Entreprise et Service"></h2>
                    <details class="faq-item">
                        <summary data-en="Which markets do you currently serve?" data-es="¿Qué mercados atienden actualmente?" data-fr="Quels marchés desservez-vous actuellement ?"></summary>
                        <div class="faq-answer" data-en="We focus on the North American trade — serving distributors, builders, and trade professionals across the United States and Canada." data-es="Nos enfocamos en el sector de América del Norte — atendiendo a distribuidores, constructores y profesionales del sector en Estados Unidos y Canadá." data-fr="Nous nous concentrons sur les professionnels d'Amérique du Nord — au service des distributeurs, constructeurs et professionnels du métier aux États-Unis et au Canada."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="Why work with FIXORA instead of buying directly from a factory?" data-es="¿Por qué trabajar con FIXORA en lugar de comprar directamente a una fábrica?" data-fr="Pourquoi travailler avec FIXORA plutôt que d'acheter directement en usine ?"></summary>
                        <div class="faq-answer" data-en="FIXORA pairs manufacturing capability with US-based service, North American inventory, and long-term partnership — reducing the lead times, quality risk, and communication gaps of factory-direct sourcing." data-es="FIXORA combina la capacidad de fabricación con servicio en EE. UU., inventario en América del Norte y una asociación a largo plazo — reduciendo los plazos, el riesgo de calidad y las brechas de comunicación del abastecimiento directo de fábrica." data-fr="FIXORA associe la capacité de fabrication à un service basé aux États-Unis, un inventaire nord-américain et un partenariat à long terme — réduisant les délais, les risques de qualité et les lacunes de communication de l'approvisionnement direct en usine."></div>
                    </details>
                    <details class="faq-item">
                        <summary data-en="How can I contact your sales team?" data-es="¿Cómo puedo contactar a su equipo de ventas?" data-fr="Comment puis-je contacter votre équipe commerciale ?"></summary>
                        <div class="faq-answer" data-en="Email mike@probuildercorp.com or use our Contact page. We'll respond promptly with the information you need." data-es="Escriba a mike@probuildercorp.com o utilice nuestra página de Contacto. Le responderemos con prontitud con la información que necesita." data-fr="Écrivez à mike@probuildercorp.com ou utilisez notre page Contact. Nous vous répondrons rapidement avec les informations dont vous avez besoin."></div>
                    </details>
                </div>
            </div>
        </div>
    </section>
