                            <p>📧 mike@probuildercorp.com</p>
                        </div>
                        <div class="contact-item">
                            <strong data-en="Distribution Center" data-es="Centro de Distribución" data-fr="Centre de Distribution"></strong>
                            <p>FIXORA Distribution Center</p>
                            <p>1822 East Francis Street</p>
                            <p>Ontario, CA 91761</p>
                        </div>
                        <div class="contact-item">
                            <strong data-en="Business Hours" data-es="Horario de Atención" data-fr="Heures d'Ouverture"></strong>

                            <p data-en="Pacific Time" data-es="Hora del Pacífico" data-fr="Heure du Pacifique"></p>
                        </div>
                    </div>
                </div>

                <!-- Inquiry form -->
                <div>
                    <h3 style="font-family:'Marcellus',serif; font-weight:400; font-size:1.6rem; margin-bottom:0.6rem;" data-en="Send an Inquiry" data-es="Enviar una Consulta" data-fr="Envoyer une Demande"></h3>
                    <p style="color:var(--text-light); margin-bottom:1.6rem;" data-en="Fill out the form and we'll get back to you shortly." data-es="Complete el formulario y nos pondremos en contacto pronto." data-fr="Remplissez le formulaire et nous vous répondrons rapidement."></p>
                    <form class="contact-form" action="mailto:mike@probuildercorp.com" method="post" enctype="text/plain">
                        <div>
                            <label data-en="Name" data-es="Nombre" data-fr="Nom"></label>
                            <input type="text" name="name" required>
                        </div>
                        <div>
                            <label data-en="Company" data-es="Empresa" data-fr="Entreprise"></label>
                            <input type="text" name="company">
                        </div>
                        <div>
                            <label data-en="Email" data-es="Correo Electrónico" data-fr="E-mail"></label>
                            <input type="email" name="email" required>
                        </div>
                        <div>
                            <label data-en="I am a..." data-es="Soy un..." data-fr="Je suis..."></label>
                            <select name="role">
                                <option data-en="Distributor" data-es="Distribuidor" data-fr="Distributeur">Distributor</option>
                                <option data-en="Builder / Contractor" data-es="Constructor / Contratista" data-fr="Constructeur / Entrepreneur">Builder / Contractor</option>
                                <option data-en="Designer / Architect" data-es="Diseñador / Arquitecto" data-fr="Designer / Architecte">Designer / Architect</option>
                                <option data-en="Other" data-es="Otro" data-fr="Autre">Other</option>
                            </select>
                        </div>
                        <div>
                            <label data-en="Message" data-es="Mensaje" data-fr="Message"></label>
                            <textarea name="message" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary" data-en="Send Inquiry" data-es="Enviar Consulta" data-fr="Envoyer la Demande"></button>
                    </form>
